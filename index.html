<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bluetooth Connector</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 800px; margin: 0 auto; }
        .card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            margin: 20px 0;
            color: white;
        }
        h1 { text-align: center; margin-bottom: 30px; }
        input, button {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: none;
            border-radius: 10px;
            font-size: 16px;
        }
        button {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { transform: scale(1.02); }
        .room-code {
            font-size: 24px;
            text-align: center;
            padding: 15px;
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            margin: 10px 0;
        }
        .status { text-align: center; margin-top: 20px; }
        .connected { color: #4ade80; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>🎧 Bluetooth Connector</h1>
            
            <div id="createSection">
                <h3>Create Room</h3>
                <input type="text" id="deviceName" placeholder="Your device name">
                <input type="text" id="roomName" placeholder="Room name">
                <button onclick="createRoom()">Create Room</button>
            </div>
            
            <div id="joinSection">
                <h3>Join Room</h3>
                <input type="text" id="joinRoomId" placeholder="Room Code">
                <input type="text" id="joinDeviceName" placeholder="Your name">
                <button onclick="joinRoom()">Join Room</button>
            </div>
            
            <div id="activeRoom" style="display:none;">
                <h3>Your Room</h3>
                <div class="room-code" id="roomCode"></div>
                <div>Connected: <span id="deviceCount">0</span> devices</div>
                <div id="mediaControls" style="margin-top:20px;">
                    <input type="text" id="mediaUrl" placeholder="Media URL (MP3, MP4, YouTube)">
                    <select id="mediaType">
                        <option value="audio">Audio</option>
                        <option value="video">Video</option>
                    </select>
                    <button onclick="startPlayback()">▶ Start Streaming</button>
                    <button onclick="pausePlayback()">⏸ Pause</button>
                </div>
            </div>
            
            <div id="memberPlayback" style="display:none; margin-top:20px;">
                <h3>Playing:</h3>
                <div id="player"></div>
            </div>
            
            <div class="status" id="status"></div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        let socket = null;
        let currentRoom = null;
        let isCreator = false;
        let mediaElement = null;
        
        function initSocket() {
            socket = io();
            
            socket.on('connect', () => {
                showStatus('✅ Connected to server', 'connected');
            });
            
            socket.on('room-created', (data) => {
                currentRoom = data.roomId;
                isCreator = true;
                document.getElementById('createSection').style.display = 'none';
                document.getElementById('joinSection').style.display = 'none';
                document.getElementById('activeRoom').style.display = 'block';
                document.getElementById('roomCode').innerText = data.roomId;
                showStatus(`Room created! Code: ${data.roomId}`, 'connected');
            });
            
            socket.on('joined-room', (data) => {
                currentRoom = data.roomId;
                isCreator = false;
                document.getElementById('createSection').style.display = 'none';
                document.getElementById('joinSection').style.display = 'none';
                document.getElementById('activeRoom').style.display = 'block';
                document.getElementById('roomCode').innerText = data.roomId;
                showStatus('Joined room successfully!', 'connected');
            });
            
            socket.on('room-update', (data) => {
                document.getElementById('deviceCount').innerText = data.deviceCount;
            });
            
            socket.on('device-joined', (data) => {
                document.getElementById('deviceCount').innerText = data.deviceCount;
                showStatus(`${data.deviceName} joined!`, 'connected');
            });
            
            socket.on('playback-started', (data) => {
                if (!isCreator) {
                    loadMedia(data.media);
                }
                showStatus('Streaming started!', 'connected');
            });
            
            socket.on('sync-time', (data) => {
                if (!isCreator && mediaElement) {
                    mediaElement.currentTime = data.currentTime;
                }
            });
            
            socket.on('playback-paused', () => {
                if (!isCreator && mediaElement) {
                    mediaElement.pause();
                }
            });
            
            socket.on('room-closed', () => {
                showStatus('Room closed by host', 'error');
                resetUI();
            });
            
            socket.on('error', (data) => {
                showStatus('Error: ' + data.message, 'error');
            });
        }
        
        function createRoom() {
            const deviceName = document.getElementById('deviceName').value || 'My Device';
            const roomName = document.getElementById('roomName').value || 'My Room';
            if (!socket) initSocket();
            socket.emit('create-room', { deviceName, roomName });
        }
        
        function joinRoom() {
            const roomId = document.getElementById('joinRoomId').value;
            const deviceName = document.getElementById('joinDeviceName').value || 'Guest';
            if (!roomId) {
                showStatus('Please enter room code!', 'error');
                return;
            }
            if (!socket) initSocket();
            socket.emit('join-room', { roomId, deviceName });
        }
        
        function startPlayback() {
            const mediaUrl = document.getElementById('mediaUrl').value;
            const mediaType = document.getElementById('mediaType').value;
            if (!mediaUrl) {
                showStatus('Please enter media URL!', 'error');
                return;
            }
            socket.emit('start-playback', { roomId: currentRoom, mediaUrl, mediaType });
        }
        
        function pausePlayback() {
            socket.emit('pause-playback', { roomId: currentRoom });
        }
        
        function loadMedia(media) {
            const container = document.getElementById('player');
            if (media.type === 'audio') {
                container.innerHTML = `<audio controls id="audioPlayer" src="${media.url}"></audio>`;
                mediaElement = document.getElementById('audioPlayer');
            } else {
                container.innerHTML = `<video controls id="videoPlayer" src="${media.url}"></video>`;
                mediaElement = document.getElementById('videoPlayer');
            }
            document.getElementById('memberPlayback').style.display = 'block';
            
            if (mediaElement) {
                mediaElement.addEventListener('timeupdate', () => {
                    if (!isCreator) {
                        socket.emit('sync-position', {
                            roomId: currentRoom,
                            currentTime: mediaElement.currentTime
                        });
                    }
                });
            }
        }
        
        function showStatus(msg, type) {
            const statusDiv = document.getElementById('status');
            statusDiv.innerHTML = msg;
            statusDiv.style.color = type === 'error' ? '#ff6b6b' : '#4ade80';
            setTimeout(() => {
                if (statusDiv.innerHTML === msg) statusDiv.innerHTML = '';
            }, 3000);
        }
        
        function resetUI() {
            currentRoom = null;
            isCreator = false;
            document.getElementById('createSection').style.display = 'block';
            document.getElementById('joinSection').style.display = 'block';
            document.getElementById('activeRoom').style.display = 'none';
            document.getElementById('memberPlayback').style.display = 'none';
        }
        
        // Test API connection
        fetch('/api/test')
            .then(res => res.json())
            .then(data => console.log('API test:', data))
            .catch(err => console.error('API error:', err));
    </script>
</body>
</html>
